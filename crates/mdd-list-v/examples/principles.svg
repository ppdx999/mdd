<svg xmlns="http://www.w3.org/2000/svg" width="536" height="467" viewBox="0 0 536 467"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 13px; fill: #333; }</style><text x="268" y="58" text-anchor="middle" font-size="16" font-weight="bold">設計原則</text><circle cx="56" cy="111.5" r="16" fill="#e3f2fd" /><text x="56" y="116.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565c0">1</text><text x="88" y="109.5" font-weight="bold">単一責任</text><text x="88" y="126.5" font-size="11" fill="#666">クラスは一つの理由でのみ変更されるべき</text><line x1="40" y1="147" x2="496" y2="147" stroke="#e0e0e0" stroke-width="1" /><circle cx="56" cy="182.5" r="16" fill="#e8f5e9" /><text x="56" y="187.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">2</text><text x="88" y="180.5" font-weight="bold">開放閉鎖</text><text x="88" y="197.5" font-size="11" fill="#666">拡張に対して開き、修正に対して閉じる</text><line x1="40" y1="218" x2="496" y2="218" stroke="#e0e0e0" stroke-width="1" /><circle cx="56" cy="253.5" r="16" fill="#fff8e1" /><text x="56" y="258.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">3</text><text x="88" y="251.5" font-weight="bold">リスコフの置換</text><text x="88" y="268.5" font-size="11" fill="#666">サブタイプは基底型と置換可能であるべき</text><line x1="40" y1="289" x2="496" y2="289" stroke="#e0e0e0" stroke-width="1" /><circle cx="56" cy="324.5" r="16" fill="#f3e5f5" /><text x="56" y="329.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#7b1fa2">4</text><text x="88" y="322.5" font-weight="bold">インターフェース分離</text><text x="88" y="339.5" font-size="11" fill="#666">クライアントに不要なインターフェースへの依存を強制しない</text><line x1="40" y1="360" x2="496" y2="360" stroke="#e0e0e0" stroke-width="1" /><circle cx="56" cy="395.5" r="16" fill="#e0f2f1" /><text x="56" y="400.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695c">5</text><text x="88" y="393.5" font-weight="bold">依存性逆転</text><text x="88" y="410.5" font-size="11" fill="#666">上位モジュールは下位モジュールに依存してはならない</text></svg>