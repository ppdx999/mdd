<svg xmlns="http://www.w3.org/2000/svg" width="448" height="382" viewBox="0 0 448 382"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 13px; fill: #333; }</style><text x="24" y="42" font-size="18" font-weight="bold">よくある質問</text><rect x="36" y="69" width="22" height="22" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/><text x="47" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Q</text><text x="66" y="85" font-size="13" font-weight="bold">無料プランはありますか？</text><rect x="36" y="104" width="22" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/><text x="47" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">A</text><text x="66" y="120" font-size="12" fill="#555">はい、基本機能は無料でご利用いただけます。</text><line x1="36" y1="146" x2="412" y2="146" stroke="#e8e8e8" stroke-width="1"/><rect x="36" y="163" width="22" height="22" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/><text x="47" y="179" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Q</text><text x="66" y="179" font-size="13" font-weight="bold">データのバックアップはどうなっていますか？</text><rect x="36" y="198" width="22" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/><text x="47" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">A</text><text x="66" y="214" font-size="12" fill="#555">毎日自動バックアップを実施しています。</text><text x="66" y="232" font-size="12" fill="#555">30日間保持されます。</text><line x1="36" y1="258" x2="412" y2="258" stroke="#e8e8e8" stroke-width="1"/><rect x="36" y="275" width="22" height="22" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/><text x="47" y="291" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565c0">Q</text><text x="66" y="291" font-size="13" font-weight="bold">解約はいつでもできますか？</text><rect x="36" y="310" width="22" height="22" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/><text x="47" y="326" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">A</text><text x="66" y="326" font-size="12" fill="#555">はい、管理画面からいつでも解約可能です。</text><text x="66" y="344" font-size="12" fill="#555">日割り返金にも対応しています。</text></svg>