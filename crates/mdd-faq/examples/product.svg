<svg xmlns="http://www.w3.org/2000/svg" width="448" height="350" viewBox="0 0 448 350"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 13px; fill: #333; }</style><text x="24" y="42" font-size="18" font-weight="bold">よくある質問</text><rect x="24" y="64" width="400" height="70" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="36" y="69" width="22" height="22" rx="4" fill="#1565c0"/><text x="47" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Q</text><text x="66" y="85" font-size="13" font-weight="bold">無料プランはありますか？</text><rect x="36" y="104" width="22" height="22" rx="4" fill="#2e7d32"/><text x="47" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="white">A</text><text x="66" y="120" font-size="12" fill="#555">はい、基本機能は無料でご利用いただけます。</text><rect x="24" y="142" width="400" height="88" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="36" y="147" width="22" height="22" rx="4" fill="#1565c0"/><text x="47" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Q</text><text x="66" y="163" font-size="13" font-weight="bold">データのバックアップはどうなっていますか？</text><rect x="36" y="182" width="22" height="22" rx="4" fill="#2e7d32"/><text x="47" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="white">A</text><text x="66" y="198" font-size="12" fill="#555">毎日自動バックアップを実施しています。</text><text x="66" y="216" font-size="12" fill="#555">30日間保持されます。</text><rect x="24" y="238" width="400" height="88" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="36" y="243" width="22" height="22" rx="4" fill="#1565c0"/><text x="47" y="259" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Q</text><text x="66" y="259" font-size="13" font-weight="bold">解約はいつでもできますか？</text><rect x="36" y="278" width="22" height="22" rx="4" fill="#2e7d32"/><text x="47" y="294" text-anchor="middle" font-size="12" font-weight="bold" fill="white">A</text><text x="66" y="294" font-size="12" fill="#555">はい、管理画面からいつでも解約可能です。</text><text x="66" y="312" font-size="12" fill="#555">日割り返金にも対応しています。</text></svg>