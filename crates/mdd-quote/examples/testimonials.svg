<svg xmlns="http://www.w3.org/2000/svg" width="428" height="406" viewBox="0 0 428 406"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 14px; fill: #333; }</style><rect x="24" y="24" width="380" height="116" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="24" y="24" width="4" height="116" rx="2" fill="#1565c0"/><text x="40" y="68" font-size="32" fill="#1565c0" opacity="0.3">“</text><text x="44" y="60" font-size="14" font-style="italic" fill="#444">導入して業務効率が3倍になりました。</text><text x="44" y="82" font-size="14" font-style="italic" fill="#444">もう手放せません。</text><text x="44" y="108" font-size="12" font-weight="bold" fill="#1565c0">— 田中太郎 / CTO・株式会社テック</text><rect x="24" y="156" width="380" height="116" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="24" y="156" width="4" height="116" rx="2" fill="#2e7d32"/><text x="40" y="200" font-size="32" fill="#2e7d32" opacity="0.3">“</text><text x="44" y="192" font-size="14" font-style="italic" fill="#444">サポートの対応が素晴らしい。</text><text x="44" y="214" font-size="14" font-style="italic" fill="#444">問い合わせから1時間以内に解決してくれた。</text><text x="44" y="240" font-size="12" font-weight="bold" fill="#2e7d32">— 鈴木花子 / プロダクトマネージャー</text><rect x="24" y="288" width="380" height="94" rx="6" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/><rect x="24" y="288" width="4" height="94" rx="2" fill="#f57f17"/><text x="40" y="332" font-size="32" fill="#f57f17" opacity="0.3">“</text><text x="44" y="324" font-size="14" font-style="italic" fill="#444">シンプルで使いやすいUIが気に入っています。</text><text x="44" y="350" font-size="12" font-weight="bold" fill="#f57f17">— 佐藤次郎 / エンジニア</text></svg>