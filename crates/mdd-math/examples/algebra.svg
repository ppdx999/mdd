<svg xmlns="http://www.w3.org/2000/svg" width="415.3846153846154" height="228" viewBox="0 0 415.3846153846154 228"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 13px; fill: #333; } text.expr { font-family: "Times New Roman", serif; font-size: 20px; fill: #333; }</style><text x="207.6923076923077" y="58" text-anchor="middle" font-size="16" font-weight="bold">二次方程式</text><text class="expr" x="207.6923076923077" y="104.66666666666667" text-anchor="middle">ax² + bx + c = 0</text><text class="expr" x="207.6923076923077" y="140.66666666666666" text-anchor="middle">x = (-b ± √(b²-4ac)) / 2a</text><text class="expr" x="207.6923076923077" y="176.66666666666666" text-anchor="middle">Δ = b² - 4ac</text></svg>