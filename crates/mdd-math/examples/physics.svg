<svg xmlns="http://www.w3.org/2000/svg" width="280" height="264" viewBox="0 0 280 264"><rect width="100%" height="100%" fill="white"/><style>text { font-family: sans-serif; font-size: 13px; fill: #333; } text.expr { font-family: "Times New Roman", serif; font-size: 20px; fill: #333; }</style><text x="140" y="58" text-anchor="middle" font-size="16" font-weight="bold">物理学の基本公式</text><text class="expr" x="140" y="104.66666666666667" text-anchor="middle">E = mc²</text><text class="expr" x="140" y="140.66666666666666" text-anchor="middle">F = ma</text><text class="expr" x="140" y="176.66666666666666" text-anchor="middle">p = mv</text><text class="expr" x="140" y="212.66666666666666" text-anchor="middle">W = Fd</text></svg>