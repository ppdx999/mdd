# Example: Generate HTML docs from Markdown with mdd diagrams
#
# Copy this file to .github/workflows/ in your repository.
# Place .md files with mdd diagram code blocks in docs/ directory.
#
# Usage in your .md files:
#
#   ```infra
#   node WebServer type=server
#   node DB type=db
#   WebServer -> DB : "SQL"
#   ```
#
#   ```er
#   table Users {
#     id PK
#     name
#   }
#   ```

name: Generate Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdd
        uses: ppdx999/mdd@main

      - name: Generate HTML from Markdown
        run: |
          mkdir -p dist
          for f in docs/*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md)
            mdd html "$f" > "dist/${name}.html"
            echo "Generated: dist/${name}.html"
          done

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: dist/

